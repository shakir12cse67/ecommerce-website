<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>ModernStore</h1>

<input type="text" id="search" placeholder="Search products...">

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#" onclick="openCart()">Cart (<span id="cartCount">0</span>)</a>
<a href="dashboard.html">Dashboard</a>
</nav>
</header>

<section class="slider">
<div class="slide active">Big Sale 50% OFF</div>
<div class="slide">New Tech Products</div>
<div class="slide">Best Clothing Deals</div>
</section>

<section class="filters">
<select id="categoryFilter">
<option value="all">All</option>
<option value="phone">Phones</option>
<option value="laptop">Laptops</option>
<option value="headphone">Headphones</option>
<option value="clothing">Clothing</option>
</select>

<input type="range" id="priceFilter" min="0" max="2000">
</section>

<section id="products" class="product-grid"></section>

<div id="cartModal" class="modal">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3>Total: $<span id="cartTotal"></span></h3>
<button onclick="checkout()">Checkout</button>
<button onclick="closeCart()">Close</button>
</div>

<div id="chatbot">
<button id="chatToggle">💬</button>

<div id="chatWindow">
<div id="chatMessages"></div>
<input id="chatInput" placeholder="Ask something...">
</div>
</div>

<footer>
<p>© 2026 ModernStore</p>
</footer>

<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
